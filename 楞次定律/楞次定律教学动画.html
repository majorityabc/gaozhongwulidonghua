<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楞次定律交互式教学动画</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #0f3460;
    --text: #e0e0e0;
    --n: #ff4444;
    --s: #4444ff;
    --b0: #4488ff;
    --bind: #ff4444;
    --current: #ffd700;
    --ok: #44ff44;
    --bad: #ff4444;
    --btn: #0f3460;
    --btn-hover: #1a4a7a;
    --border: #2a3a5e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
  }
  header {
    flex: 0 0 auto;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; }
  header .subtitle { font-size: 12px; opacity: .8; }
  #main {
    flex: 1 1 auto;
    display: flex;
    overflow: hidden;
  }
  #canvasWrap {
    flex: 1 1 auto;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    background: radial-gradient(circle at 50% 40%, #1e2a4a 0%, #0f1020 70%);
  }
  #sidebar {
    flex: 0 0 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .panel {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel h3 { margin: 0 0 8px; font-size: 14px; color: #b0c4ff; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn {
    background: var(--btn);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: background .2s, transform .1s;
    user-select: none;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn:active { transform: translateY(1px); }
  .btn.active { background: #1a5a9a; border-color: #4a8acc; }
  .btn.n { background: #5a2020; border-color: #aa4444; }
  .btn.n.active { background: #aa2020; }
  .btn.s { background: #20205a; border-color: #4444aa; }
  .btn.s.active { background: #2020aa; }
  .btn.ok { background: #1a5a1a; border-color: #44aa44; }
  .btn.ok.active { background: #228822; }
  .sliderWrap { display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; }
  .hint { font-size: 12px; color: #aaccff; line-height: 1.5; }
  .quiz { margin-top: 6px; }
  .quiz .q { font-size: 13px; margin-bottom: 6px; }
  .quiz .opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .feedback { margin-top: 6px; font-size: 13px; min-height: 18px; }
  .feedback.ok { color: var(--ok); }
  .feedback.bad { color: var(--bad); }
  #bottomNav {
    flex: 0 0 auto;
    display: flex; justify-content: center; gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
  #bottomNav .btn { min-width: 90px; text-align: center; }
  .timeline {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .timeline input[type=range] { flex: 1; }
  .tabbar { display: flex; gap: 4px; margin-bottom: 8px; }
  .tabbar .btn { flex: 1; text-align: center; }
  @media (max-width: 900px) {
    #sidebar { flex: 0 0 240px; }
  }
  @media (max-width: 720px) {
    #main { flex-direction: column; }
    #sidebar { flex: 0 0 auto; border-left: none; border-top: 1px solid var(--border); max-height: 38vh; }
    #bottomNav { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>楞次定律 · 交互式教学动画</h1>
      <div class="subtitle">Lenz's Law Interactive Animation</div>
    </div>
    <div style="font-size:12px;opacity:.7">拖动磁铁 · 点击按钮 · 观察感应电流</div>
  </header>
  <div id="main">
    <div id="canvasWrap"><canvas id="c"></canvas></div>
    <div id="sidebar"></div>
  </div>
  <div id="bottomNav"></div>
</div>

<script>
/* ================================================================
   楞次定律交互式教学动画 — 单文件 HTML5 Canvas 实现
   作者：AI 生成（教学用途）
   结构：
     - 全局工具函数与色彩定义
     - 场景基类 Scene
     - 5 个具体场景
     - 主循环与事件管理
   ================================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sidebar = document.getElementById('sidebar');
const bottomNav = document.getElementById('bottomNav');

/* ---------- 工具 ---------- */
function resize() {
  const wrap = document.getElementById('canvasWrap');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w, h };
}
let size = resize();
window.addEventListener('resize', () => { size = resize(); });

const C = {
  bg: '#1a1a2e',
  n: '#ff4444',
  s: '#4444ff',
  b0: '#4488ff',
  bind: '#ff4444',
  current: '#ffd700',
  ok: '#44ff44',
  bad: '#ff4444',
  text: '#e0e0e0',
  panel: '#16213e',
  accent: '#0f3460',
  grid: '#2a3a5e',
};

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function angleBetween(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); }

function drawArrow(ctx, x1, y1, x2, y2, color, width = 2, head = 8) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  const ang = Math.atan2(y2 - y1, x2 - y1);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - head * Math.cos(ang - Math.PI / 6), y2 - head * Math.sin(ang - Math.PI / 6));
  ctx.lineTo(x2 - head * Math.cos(ang + Math.PI / 6), y2 - head * Math.sin(ang + Math.PI / 6));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawMagnet(ctx, x, y, w, h, angle, labelN, labelS, opacity = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = opacity;
  const hw = w / 2, hh = h / 2;
  // N极（左半）
  ctx.fillStyle = C.n;
  ctx.fillRect(-hw, -hh, hw, h);
  // S极（右半）
  ctx.fillStyle = C.s;
  ctx.fillRect(0, -hh, hw, h);
  // 边框
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-hw, -hh, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(0, -hh);
  ctx.lineTo(0, hh);
  ctx.stroke();
  // 文字
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(labelN, -hw / 2, 0);
  ctx.fillText(labelS, hw / 2, 0);
  ctx.restore();
}

function drawCoil(ctx, cx, cy, r, turns, currentDir, intensity, label) {
  // 线圈用螺旋表示，currentDir: 1=逆时针(从正面看), -1=顺时针
  ctx.save();
  ctx.translate(cx, cy);
  const maxW = 6;
  const lw = Math.min(maxW, Math.abs(intensity) * 4 + 1);
  ctx.lineWidth = lw;
  ctx.strokeStyle = intensity > 0.02 ? C.current : '#555';
  ctx.lineCap = 'round';
  for (let i = 0; i < turns; i++) {
    const rr = r + i * 6;
    ctx.beginPath();
    ctx.ellipse(0, 0, rr, rr * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // 电流方向箭头（画在最外圈）
  if (Math.abs(intensity) > 0.05) {
    const rr = r + (turns - 1) * 6;
    const t = (Date.now() / 1000) % (Math.PI * 2);
    const ang = currentDir > 0 ? t : -t;
    const ax = Math.cos(ang) * rr;
    const ay = Math.sin(ang) * rr * 0.35;
    const ta = currentDir > 0 ? ang + 0.3 : ang - 0.3;
    const tx = Math.cos(ta) * rr;
    const ty = Math.sin(ta) * rr * 0.35;
    drawArrow(ctx, ax, ay, tx, ty, C.current, 2, 5);
  }
  // 标签
  if (label) {
    ctx.fillStyle = C.text;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, r + turns * 6 + 14);
  }
  ctx.restore();
}

function drawFieldLines(ctx, cx, cy, angle, strength, color, count = 7) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = clamp(Math.abs(strength), 0.15, 0.7);
  for (let i = -Math.floor(count / 2); i <= Math.floor(count / 2); i++) {
    const y = i * 14;
    const len = 80 + Math.abs(strength) * 40;
    ctx.beginPath();
    ctx.moveTo(-len, y);
    ctx.lineTo(len, y);
    ctx.stroke();
    if (strength > 0) {
      drawArrow(ctx, len - 10, y, len, y, color, 1, 5);
    } else {
      drawArrow(ctx, -len + 10, y, -len, y, color, 1, 5);
    }
  }
  ctx.restore();
}

function drawGrid(ctx, w, h) {
  ctx.save();
  ctx.strokeStyle = C.grid;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  const step = 40;
  for (let x = 0; x < w; x += step) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = 0; y < h; y += step) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGlowCircle(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const g = ctx.createRadialGradient(x, y, r * 0.2, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* ---------- 场景基类 ---------- */
class Scene {
  constructor(name) { this.name = name; this.enterTime = 0; }
  enter() { this.enterTime = Date.now(); this.buildUI(); }
  exit() { sidebar.innerHTML = ''; }
  buildUI() {}
  update(dt) {}
  draw(ctx, w, h) {}
  onPointerDown(e) {}
  onPointerMove(e) {}
  onPointerUp(e) {}
  getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
}

/* ================================================================
   场景1：磁铁靠近线圈 — 理解"阻碍≠阻止"
   ================================================================ */
class Scene1 extends Scene {
  constructor() {
    super('阻碍≠阻止');
    this.magnetX = 0;
    this.magnetY = 0;
    this.dragging = false;
    this.coilX = 0;
    this.coilY = 0;
    this.magnetW = 100;
    this.magnetH = 30;
    this.magnetAngle = 0;
    this.speed = 0;
    this.lastX = 0;
    this.autoMove = true;
    this.autoDir = 1;
    this.autoT = 0;
  }
  enter() {
    super.enter();
    this.magnetX = -180;
    this.magnetY = 0;
    this.autoMove = true;
  }
  buildUI() {
    sidebar.innerHTML = `
      <div class="panel">
        <h3>场景1：阻碍 ≠ 阻止</h3>
        <div class="hint">
          磁铁自动靠近线圈，观察感应电流方向。<br>
          感应磁场总是<strong>阻碍</strong>原磁通变化，但不会<strong>阻止</strong>它。<br>
          你可以拖动磁铁亲自体验。
        </div>
      </div>
      <div class="panel">
        <h3>控制</h3>
        <div class="row">
          <button class="btn ${this.autoMove ? 'active' : ''}" id="s1-auto">自动演示</button>
          <button class="btn" id="s1-reset">重置位置</button>
        </div>
      </div>
      <div class="panel">
        <h3>关键理解</h3>
        <div class="hint">
          • 磁铁靠近 → 磁通量增加 → 感应电流产生反向磁场 → <strong>阻碍靠近</strong><br>
          • 但磁铁仍然靠近了！这就是"阻碍≠阻止"<br>
          • 若真的"阻止"，磁通量就不会变化，也就没有感应电流了
        </div>
      </div>
    `;
    document.getElementById('s1-auto').onclick = () => {
      this.autoMove = !this.autoMove;
      this.buildUI();
    };
    document.getElementById('s1-reset').onclick = () => {
      this.magnetX = -200;
      this.autoT = 0;
    };
  }
  update(dt) {
    const w = size.w, h = size.h;
    this.coilX = w / 2;
    this.coilY = h / 2;
    if (this.autoMove && !this.dragging) {
      this.autoT += dt * 0.8;
      this.magnetX = Math.sin(this.autoT) * 160;
      this.magnetY = Math.sin(this.autoT * 0.7) * 30;
      this.magnetAngle = Math.sin(this.autoT * 0.3) * 0.1;
    }
    this.speed = (this.magnetX - this.lastX) / Math.max(dt, 0.001);
    this.lastX = this.magnetX;
  }
  draw(ctx, w, h) {
    const cx = w / 2, cy = h / 2;
    // 背景网格
    drawGrid(ctx, w, h);
    // 距离与强度
    const d = dist(this.magnetX + cx, this.magnetY + cy, cx, cy);
    const strength = clamp(200 / (d + 40), 0, 3);
    const approaching = this.speed > 0.5; // 向右靠近为正
    const leaving = this.speed < -0.5;
    // 原磁场（假设N极在左，S极在右，磁场向右）
    drawFieldLines(ctx, this.magnetX + cx, this.magnetY + cy, this.magnetAngle, strength, C.b0, 5);
    // 感应磁场
    let indStrength = 0;
    if (approaching) indStrength = strength * 0.6; // 反向
    if (leaving) indStrength = -strength * 0.4;
    if (Math.abs(indStrength) > 0.05) {
      drawFieldLines(ctx, cx, cy, 0, -indStrength, C.bind, 5);
    }
    // 线圈
    const currentDir = approaching ? -1 : (leaving ? 1 : 0);
    const currentInt = Math.abs(indStrength) * 0.5;
    drawCoil(ctx, cx, cy, 50, 5, currentDir, currentInt, approaching ? '感应电流：阻碍靠近' : (leaving ? '感应电流：阻碍远离' : ''));
    // 磁铁
    drawMagnet(ctx, this.magnetX + cx, this.magnetY + cy, this.magnetW, this.magnetH, this.magnetAngle, 'N', 'S');
    // 文字提示
    ctx.fillStyle = C.text;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    const status = approaching ? '磁铁靠近中 → 感应磁场排斥' : (leaving ? '磁铁远离中 → 感应磁场吸引' : '移动磁铁观察感应电流');
    ctx.fillText(status, cx, h - 30);
    // 阻碍≠阻止 提示
    if (approaching && d < 120) {
      ctx.fillStyle = C.ok;
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('注意：磁铁仍在靠近！阻碍 ≠ 阻止', cx, 40);
    }
  }
  onPointerDown(e) {
    const p = this.getPointerPos(e);
    const mx = this.magnetX + size.w / 2, my = this.magnetY + size.h / 2;
    if (dist(p.x, p.y, mx, my) < 60) {
      this.dragging = true;
      this.autoMove = false;
      this.dragOffX = p.x - mx;
      this.dragOffY = p.y - my;
    }
  }
  onPointerMove(e) {
    if (!this.dragging) return;
    const p = this.getPointerPos(e);
    this.magnetX = p.x - this.dragOffX - size.w / 2;
    this.magnetY = p.y - this.dragOffY - size.h / 2;
  }
  onPointerUp(e) { this.dragging = false; }
}

/* ================================================================
   场景2：增反减同 — 方向判断
   ================================================================ */
class Scene2 extends Scene {
  constructor() {
    super('增反减同');
    this.pole = 'N'; // 'N' or 'S'
    this.action = 'near'; // 'near' or 'far'
    this.viewAngle = 0; // 伪3D旋转角度
    this.rotating = false;
    this.quizAnswered = false;
    this.quizCorrect = false;
    this.showResult = false;
  }
  enter() { super.enter(); this.quizAnswered = false; this.showResult = false; }
  buildUI() {
    sidebar.innerHTML = `
      <div class="panel">
        <h3>场景2：增反减同</h3>
        <div class="hint">
          <strong>增反减同</strong>：磁通量增加时，感应磁场与原磁场方向相反；减少时相同。<br>
          选择磁极和运动方向，观察感应电流方向，然后回答测验。
        </div>
      </div>
      <div class="panel">
        <h3>磁极</h3>
        <div class="row">
          <button class="btn n ${this.pole === 'N' ? 'active' : ''}" id="s2-n">N极</button>
          <button class="btn s ${this.pole === 'S' ? 'active' : ''}" id="s2-s">S极</button>
        </div>
      </div>
      <div class="panel">
        <h3>运动</h3>
        <div class="row">
          <button class="btn ${this.action === 'near' ? 'active' : ''}" id="s2-near">靠近</button>
          <button class="btn ${this.action === 'far' ? 'active' : ''}" id="s2-far">远离</button>
        </div>
      </div>
      <div class="panel">
        <h3>视角旋转</h3>
        <div class="sliderWrap">
          <span>侧视</span>
          <input type="range" id="s2-angle" min="-45" max="45" value="${this.viewAngle}">
          <span>俯视</span>
        </div>
      </div>
      <div class="panel quiz">
        <h3>即时测验</h3>
        <div class="q">当${this.pole}极${this.action === 'near' ? '靠近' : '远离'}线圈时，感应磁场方向是？</div>
        <div class="opts">
          <button class="btn" id="s2-q1">与原磁场相同</button>
          <button class="btn" id="s2-q2">与原磁场相反</button>
        </div>
        <div class="feedback ${this.quizCorrect ? 'ok' : 'bad'}" id="s2-fb">${this.showResult ? (this.quizCorrect ? '✓ 正确！' : '✗ 再想想...') : ''}</div>
      </div>
    `;
    document.getElementById('s2-n').onclick = () => { this.pole = 'N'; this.quizAnswered = false; this.showResult = false; this.buildUI(); };
    document.getElementById('s2-s').onclick = () => { this.pole = 'S'; this.quizAnswered = false; this.showResult = false; this.buildUI(); };
    document.getElementById('s2-near').onclick = () => { this.action = 'near'; this.quizAnswered = false; this.showResult = false; this.buildUI(); };
    document.getElementById('s2-far').onclick = () => { this.action = 'far'; this.quizAnswered = false; this.showResult = false; this.buildUI(); };
    document.getElementById('s2-angle').oninput = (e) => { this.viewAngle = parseFloat(e.target.value); };
    document.getElementById('s2-q1').onclick = () => this.checkQuiz('same');
    document.getElementById('s2-q2').onclick = () => this.checkQuiz('opp');
  }
  checkQuiz(ans) {
    this.quizAnswered = true;
    this.showResult = true;
    // 增反减同：靠近(增)→相反，远离(减)→相同
    const correct = (this.action === 'near' && ans === 'opp') || (this.action === 'far' && ans === 'same');
    this.quizCorrect = correct;
    this.buildUI();
  }
  update(dt) {}
  draw(ctx, w, h) {
    drawGrid(ctx, w, h);
    const cx = w / 2, cy = h / 2;
    const tilt = this.viewAngle * Math.PI / 180;
    // 磁铁位置（根据动作）
    const magnetOffset = this.action === 'near' ? -80 : -220;
    const mx = cx + magnetOffset * Math.cos(tilt);
    const my = cy - 40 + magnetOffset * Math.sin(tilt) * 0.3;
    const magAngle = tilt;
    // 原磁场方向
    const b0Dir = this.pole === 'N' ? 1 : -1; // N极在左则磁场向右
    // 感应磁场
    const increasing = this.action === 'near';
    const bindDir = increasing ? -b0Dir : b0Dir; // 增反减同
    // 绘制原磁场
    drawFieldLines(ctx, mx, my, magAngle, b0Dir * 2, C.b0, 5);
    // 绘制感应磁场
    drawFieldLines(ctx, cx, cy + 40, 0, bindDir * 1.5, C.bind, 5);
    // 线圈（用透视椭圆模拟）
    ctx.save();
    ctx.translate(cx, cy + 40);
    ctx.scale(1, 0.4);
    ctx.strokeStyle = C.current;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 60, 0, Math.PI * 2);
    ctx.stroke();
    // 电流方向
    const currentDir = bindDir > 0 ? -1 : 1; // 简化
    const t = Date.now() / 800;
    const ca = currentDir > 0 ? t : -t;
    const cax = Math.cos(ca) * 60;
    const cay = Math.sin(ca) * 60;
    const cta = currentDir > 0 ? ca + 0.3 : ca - 0.3;
    ctx.restore();
    // 重新计算箭头位置（不缩放）
    const rr = 60;
    const ax = cx + Math.cos(ca) * rr;
    const ay = cy + 40 + Math.sin(ca) * rr * 0.4;
    const tx = cx + Math.cos(cta) * rr;
    const ty = cy + 40 + Math.sin(cta) * rr * 0.4;
    drawArrow(ctx, ax, ay, tx, ty, C.current, 2, 5);
    // 磁铁
    const labelN = this.pole === 'N' ? 'N' : 'S';
    const labelS = this.pole === 'N' ? 'S' : 'N';
    drawMagnet(ctx, mx, my, 100, 30, magAngle, labelN, labelS);
    // 标签
    ctx.fillStyle = C.b0;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('原磁场', mx, my - 50);
    ctx.fillStyle = C.bind;
    ctx.fillText('感应磁场', cx, cy + 40 + 50);
    // 说明文字
    ctx.fillStyle = C.text;
    ctx.font = '14px sans-serif';
    const desc = `${this.pole}极${this.action === 'near' ? '靠近' : '远离'} → 磁通量${increasing ? '增加' : '减少'} → 感应磁场${increasing ? '相反（增反）' : '相同（减同）'}`;
    ctx.fillText(desc, cx, h - 30);
    // 测验反馈
    if (this.showResult) {
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = this.quizCorrect ? C.ok : C.bad;
      ctx.fillText(this.quizCorrect ? '✓ 回答正确！' : '✗ 答案错误，请观察磁场方向', cx, 40);
    }
  }
}

/* ================================================================
   场景3：来拒去留 — 力学效果
   ================================================================ */
class Scene3 extends Scene {
  constructor() {
    super('来拒去留');
    this.tab = 'apply'; // 'apply' or 'notapply'
    this.magnetX = -150;
    this.animT = 0;
    this.playing = false;
  }
  enter() { super.enter(); this.magnetX = -150; this.animT = 0; this.playing = false; }
  buildUI() {
    sidebar.innerHTML = `
      <div class="panel">
        <h3>场景3：来拒去留</h3>
        <div class="hint">
          <strong>来拒去留</strong>：磁铁靠近时线圈排斥它，远离时吸引它。<br>
          但这不是万能的！切换标签查看适用与不适用场景。
        </div>
      </div>
      <div class="panel">
        <div class="tabbar">
          <button class="btn ${this.tab === 'apply' ? 'active' : ''}" id="s3-apply">适用场景</button>
          <button class="btn ${this.tab === 'notapply' ? 'active' : ''}" id="s3-not">不适用场景</button>
        </div>
      </div>
      <div class="panel">
        <h3>演示</h3>
        <div class="row">
          <button class="btn ${this.playing ? 'active' : ''}" id="s3-play">${this.playing ? '暂停' : '播放动画'}</button>
          <button class="btn" id="s3-reset">重置</button>
        </div>
      </div>
      <div class="panel">
        <h3>说明</h3>
        <div class="hint" id="s3-hint">
          ${this.tab === 'apply'
            ? '线圈可自由移动时，"来拒去留"表现为线圈的平动或转动。这是楞次定律的力学效果。'
            : '线圈固定或磁通量变化由其他原因引起时（如改变线圈面积、改变磁场强度），"来拒去留"不直接表现为磁铁受力。'}
        </div>
      </div>
    `;
    document.getElementById('s3-apply').onclick = () => { this.tab = 'apply'; this.buildUI(); };
    document.getElementById('s3-not').onclick = () => { this.tab = 'notapply'; this.buildUI(); };
    document.getElementById('s3-play').onclick = () => { this.playing = !this.playing; this.buildUI(); };
    document.getElementById('s3-reset').onclick = () => { this.animT = 0; this.magnetX = -150; this.playing = false; this.buildUI(); };
  }
  update(dt) {
    if (this.playing) {
      this.animT += dt * 0.6;
      this.magnetX = Math.sin(this.animT) * 160;
    }
  }
  draw(ctx, w, h) {
    drawGrid(ctx, w, h);
    const cx = w / 2, cy = h / 2;
    if (this.tab === 'apply') {
      // 适用场景：线圈可移动
      const coilOffset = this.magnetX * 0.35; // 线圈被推动
      const coilX = cx + coilOffset;
      const coilY = cy;
      // 绘制线圈（可移动）
      drawCoil(ctx, coilX, coilY, 70, 50, 8);
      // 绘制磁铁
      const magX = cx + this.magnetX;
      const magY = cy;
      drawMagnet(ctx, magX, magY, 100, 30, 0, 'N', 'S');
      // 受力箭头
      const forceDir = this.magnetX > 0 ? 1 : -1;
      const forceLen = Math.abs(this.magnetX) * 0.5;
      if (forceLen > 5) {
        ctx.strokeStyle = C.bad;
        ctx.lineWidth = 3;
        const fx = coilX + (forceDir > 0 ? -1 : 1) * 80;
        const fy = coilY;
        drawArrow(ctx, fx, fy, fx + forceDir * forceLen, fy, C.bad, 3, 8);
        ctx.fillStyle = C.bad;
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('安培力', fx + forceDir * forceLen * 0.5, fy - 10);
      }
      // 运动趋势文字
      ctx.fillStyle = C.text;
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      if (this.magnetX > 10) {
        ctx.fillText('磁铁靠近 → 线圈被排斥（来拒）', cx, h - 40);
      } else if (this.magnetX < -10) {
        ctx.fillText('磁铁远离 → 线圈被吸引（去留）', cx, h - 40);
      } else {
        ctx.fillText('观察线圈的运动趋势', cx, h - 40);
      }
    } else {
      // 不适用场景：线圈固定，磁场均匀变化
      const coilX = cx, coilY = cy;
      drawCoil(ctx, coilX, coilY, 70, 50, 8);
      // 均匀磁场（平行线）
      ctx.strokeStyle = C.b0;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      for (let i = -3; i <= 3; i++) {
        const y = coilY + i * 25;
        ctx.beginPath();
        ctx.moveTo(coilX - 150, y);
        ctx.lineTo(coilX + 150, y);
        ctx.stroke();
        // 箭头
        drawArrow(ctx, coilX + 100, y, coilX + 130, y, C.b0, 2, 5);
      }
      ctx.setLineDash([]);
      // 灰色遮罩提示
      ctx.fillStyle = 'rgba(100,100,100,0.3)';
      ctx.fillRect(coilX - 160, coilY - 100, 320, 200);
      ctx.fillStyle = '#ffaa00';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚠ 此场景"来拒去留"不适用', coilX, coilY);
      ctx.fillStyle = C.text;
      ctx.font = '13px sans-serif';
      ctx.fillText('线圈固定，磁场均匀变化', coilX, coilY + 25);
      ctx.fillText('应使用"增反减同"分析', coilX, coilY + 45);
    }
  }
}

/* ================================================================
   场景4：增缩减扩 — 线圈形变
   ================================================================ */
class Scene4 extends Scene {
  constructor() {
    super('增缩减扩');
    this.bChange = 0; // -1 减弱, 0 不变, 1 增强
    this.bRate = 0.5;
    this.deform = 0; // 形变程度
  }
  enter() { super.enter(); this.bChange = 0; this.deform = 0; }
  buildUI() {
    sidebar.innerHTML = `
      <div class="panel">
        <h3>场景4：增缩减扩</h3>
        <div class="hint">
          <strong>增缩减扩</strong>：磁场增强时线圈收缩，减弱时扩张。<br>
          本质是阻碍磁通量变化：Φ = B·S
        </div>
      </div>
      <div class="panel">
        <h3>磁场变化</h3>
        <div class="row">
          <button class="btn ${this.bChange === 1 ? 'active' : ''}" id="s4-inc">增强磁场</button>
          <button class="btn ${this.bChange === -1 ? 'active' : ''}" id="s4-dec">减弱磁场</button>
          <button class="btn ${this.bChange === 0 ? 'active' : ''}" id="s4-none">不变</button>
        </div>
      </div>
      <div class="panel">
        <h3>变化速率</h3>
        <div class="sliderWrap">
          <span>慢</span>
          <input type="range" id="s4-rate" min="0.1" max="1.0" step="0.1" value="${this.bRate}">
          <span>快</span>
        </div>
      </div>
      <div class="panel">
        <h3>公式</h3>
        <div class="hint" style="font-family:serif; font-size:15px;">
          Φ = B · S<br>
          B↑ → S↓（收缩）<br>
          B↓ → S↑（扩张）
        </div>
      </div>
    `;
    document.getElementById('s4-inc').onclick = () => { this.bChange = 1; this.buildUI(); };
    document.getElementById('s4-dec').onclick = () => { this.bChange = -1; this.buildUI(); };
    document.getElementById('s4-none').onclick = () => { this.bChange = 0; this.buildUI(); };
    document.getElementById('s4-rate').oninput = (e) => { this.bRate = parseFloat(e.target.value); };
  }
  update(dt) {
    const target = this.bChange === 1 ? -0.4 : (this.bChange === -1 ? 0.4 : 0);
    this.deform += (target - this.deform) * dt * this.bRate * 2;
  }
  draw(ctx, w, h) {
    drawGrid(ctx, w, h);
    const cx = w / 2, cy = h / 2;
    // 形变后的线圈（椭圆）
    const rx = 80 + this.deform * 60;
    const ry = 80 - this.deform * 30;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.strokeStyle = C.current;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, Math.max(rx, 20), Math.max(ry, 20), 0, 0, Math.PI * 2);
    ctx.stroke();
    // 电流方向
    const t = Date.now() / 600;
    const ca = t;
    const cax = Math.cos(ca) * rx;
    const cay = Math.sin(ca) * ry;
    const cta = ca + 0.3;
    ctx.restore();
    drawArrow(ctx, cx + cax, cy + cay, cx + Math.cos(cta) * rx, cy + Math.sin(cta) * ry, C.current, 2, 5);
    // 磁场符号
    ctx.fillStyle = C.b0;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    for (let i = -2; i <= 2; i++) {
      for (let j = -2; j <= 2; j++) {
        const sx = cx + i * 50;
        const sy = cy + j * 50;
        if (this.bChange === 1) {
          ctx.fillText('×', sx, sy);
        } else if (this.bChange === -1) {
          ctx.fillText('·', sx, sy);
        } else {
          ctx.fillText('⊙', sx, sy);
        }
      }
    }
    // 说明
    ctx.fillStyle = C.text;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    if (this.bChange === 1) {
      ctx.fillText('磁场增强 → 线圈收缩（增缩）', cx, h - 40);
    } else if (this.bChange === -1) {
      ctx.fillText('磁场减弱 → 线圈扩张（减扩）', cx, h - 40);
    } else {
      ctx.fillText('选择磁场变化观察线圈形变', cx, h - 40);
    }
  }
}

/* ================================================================
   场景5：综合挑战
   ================================================================ */
class Scene5 extends Scene {
  constructor() {
    super('综合挑战');
    this.phase = 0; // 0:靠近 1:中心 2:远离
    this.magnetX = -200;
    this.playing = false;
    this.score = 0;
    this.answered = [false, false, false];
    this.correct = [false, false, false];
  }
  enter() { super.enter(); this.reset(); }
  reset() {
    this.phase = 0;
    this.magnetX = -200;
    this.playing = false;
    this.answered = [false, false, false];
    this.correct = [false, false, false];
  }
  buildUI() {
    const totalScore = this.correct.filter(x => x).length;
    sidebar.innerHTML = `
      <div class="panel">
        <h3>场景5：综合挑战</h3>
        <div class="hint">
          磁铁穿过线圈的全过程分析！判断每个阶段的电流方向和受力方向。
        </div>
      </div>
      <div class="panel">
        <h3>控制</h3>
        <div class="row">
          <button class="btn ${this.playing ? 'active' : ''}" id="s5-play">${this.playing ? '暂停' : '播放'}</button>
          <button class="btn" id="s5-reset">重置</button>
        </div>
        <div class="timeline">
          <span>位置</span>
          <input type="range" id="s5-pos" min="-200" max="200" value="${this.magnetX}">
        </div>
      </div>
      <div class="panel">
        <h3>测验</h3>
        <div class="quiz">
          <div class="q">阶段 ${this.phase + 1}/3：电流方向？</div>
          <div class="opts">
            <button class="btn" id="s5-a1">顺时针</button>
            <button class="btn" id="s5-a2">逆时针</button>
            <button class="btn" id="s5-a3">无电流</button>
          </div>
          <div class="feedback ${this.answered[this.phase] ? (this.correct[this.phase] ? 'ok' : 'bad') : ''}" id="s5-fb">
            ${this.answered[this.phase] ? (this.correct[this.phase] ? '✓ 正确！' : '✗ 再想想') : ''}
          </div>
        </div>
      </div>
      <div class="panel">
        <h3>得分</h3>
        <div class="hint" style="font-size:18px; color:${totalScore === 3 ? C.ok : C.current};">
          ${totalScore} / 3
        </div>
      </div>
    `;
    document.getElementById('s5-play').onclick = () => { this.playing = !this.playing; this.buildUI(); };
    document.getElementById('s5-reset').onclick = () => { this.reset(); this.buildUI(); };
    document.getElementById('s5-pos').oninput = (e) => { this.magnetX = parseInt(e.target.value); this.playing = false; this.buildUI(); };
    document.getElementById('s5-a1').onclick = () => this.checkAnswer(0);
    document.getElementById('s5-a2').onclick = () => this.checkAnswer(1);
    document.getElementById('s5-a3').onclick = () => this.checkAnswer(2);
  }
  checkAnswer(ans) {
    if (this.answered[this.phase]) return;
    const correctAns = [0, 2, 1]; // 阶段0:顺时针, 阶段1:无, 阶段2:逆时针
    this.correct[this.phase] = (ans === correctAns[this.phase]);
    this.answered[this.phase] = true;
    this.buildUI();
  }
  update(dt) {
    if (this.playing) {
      this.magnetX += dt * 60;
      if (this.magnetX > 200) {
        this.magnetX = -200;
        this.playing = false;
      }
    }
    // 自动判断阶段
    if (this.magnetX < -30) this.phase = 0;
    else if (this.magnetX > 30) this.phase = 2;
    else this.phase = 1;
  }
  draw(ctx, w, h) {
    drawGrid(ctx, w, h);
    const cx = w / 2, cy = h / 2;
    // 线圈
    drawCoil(ctx, cx, cy, 70, 50, 8);
    // 磁铁
    const magX = cx + this.magnetX;
    const magY = cy;
    drawMagnet(ctx, magX, magY, 100, 30, 0, 'N', 'S');
    // 阶段标记
    ctx.fillStyle = C.text;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    const phaseNames = ['靠近阶段', '中心阶段', '远离阶段'];
    ctx.fillText(`当前：${phaseNames[this.phase]}`, cx, 30);
    // 磁通量变化提示
    if (this.phase === 0) {
      ctx.fillStyle = C.ok;
      ctx.fillText('磁通量增加 → 感应电流产生', cx, h - 50);
    } else if (this.phase === 1) {
      ctx.fillStyle = '#ffaa00';
      ctx.fillText('磁通量最大但变化率为零 → 无感应电流', cx, h - 50);
    } else {
      ctx.fillStyle = C.bad;
      ctx.fillText('磁通量减少 → 感应电流反向', cx, h - 50);
    }
    // 得分显示
    const totalScore = this.correct.filter(x => x).length;
    ctx.fillStyle = totalScore === 3 ? C.ok : C.current;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(`得分: ${totalScore}/3`, w - 80, 30);
  }
}

/* ================================================================
   主程序：场景管理与动画循环
   ================================================================ */
const scenes = [
  new Scene1(),
  new Scene2(),
  new Scene3(),
  new Scene4(),
  new Scene5()
];
let currentScene = 0;

function switchScene(idx) {
  scenes[currentScene].exit();
  currentScene = idx;
  scenes[currentScene].enter();
  buildNav();
}

function buildNav() {
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = scenes.map((s, i) =>
    `<button class="btn ${i === currentScene ? 'active' : ''}" onclick="switchScene(${i})">${i + 1}. ${s.name}</button>`
  ).join('');
}

// 初始化
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let lastTime = 0;

function resize() {
  const wrap = document.getElementById('canvasWrap');
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, w, h);
  scenes[currentScene].update(dt);
  scenes[currentScene].draw(ctx, w, h);
  requestAnimationFrame(loop);
}

// 指针事件绑定
canvas.addEventListener('pointerdown', (e) => scenes[currentScene].onPointerDown(e));
canvas.addEventListener('pointermove', (e) => scenes[currentScene].onPointerMove(e));
canvas.addEventListener('pointerup', (e) => scenes[currentScene].onPointerUp(e));

// 启动
scenes[0].enter();
buildNav();
requestAnimationFrame(loop);
</script>
