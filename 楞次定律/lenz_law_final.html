<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楞次定律 - 磁通量变化与感应电流</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            color: #ffd700;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        canvas {
            border: 2px solid #444;
            border-radius: 8px;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .info-panel {
            width: 280px;
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
        }
        .info-panel h3 {
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .info-item {
            margin: 12px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 14px;
        }
        .info-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: bold;
        }
        .flux-value { color: #66ccff; }
        .current-value { color: #ff6666; }
        .direction-value { color: #66ff66; }
        .formula {
            text-align: center;
            color: #ffd700;
            font-style: italic;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 5px;
        }
        .explanation {
            margin-top: 15px;
            padding: 10px;
            background: rgba(100, 200, 255, 0.1);
            border-left: 3px solid #66ccff;
            border-radius: 0 5px 5px 0;
            font-size: 13px;
            line-height: 1.6;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            background: rgba(100, 150, 255, 0.2);
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #66ccff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(100, 150, 255, 0.4);
        }
        button.active {
            background: rgba(100, 150, 255, 0.6);
            color: #fff;
        }
        .legend {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 3px;
            margin-right: 8px;
        }
        .status-bar {
            margin-top: 10px;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
        }
        .status-increasing {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6666;
        }
        .status-decreasing {
            background: rgba(100, 255, 100, 0.2);
            color: #66ff66;
        }
        .status-constant {
            background: rgba(200, 200, 200, 0.2);
            color: #aaaaaa;
        }
    </style>
</head>
<body>
    <h1>⚡ 楞次定律演示实验</h1>
    <div class="subtitle">条形磁铁插入线圈 - 磁通量变化与感应电流</div>
    
    <div class="main-container">
        <canvas id="canvas" width="900" height="600"></canvas>
        
        <div class="info-panel">
            <h3>📊 实时数据</h3>
            
            <div class="formula">ε = -N · dΦ/dt</div>
            
            <div class="info-item">
                <div class="info-label">穿过线圈的磁通量 Φ</div>
                <div class="info-value flux-value" id="fluxValue">0.000</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">磁通量变化率 dΦ/dt</div>
                <div class="info-value" id="fluxChangeValue">0.000</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">感应电流 I</div>
                <div class="info-value current-value" id="currentValue">0.000 A</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">电流方向（从左向右看）</div>
                <div class="info-value direction-value" id="directionValue">无</div>
            </div>
            
            <div id="statusBar" class="status-bar status-constant">
                磁铁静止 - 无感应电流
            </div>
            
            <div class="explanation" id="explanation">
                <strong>楞次定律：</strong>感应电流的磁场总是阻碍引起感应电流的磁通量的变化。
            </div>
            
            <div class="legend">
                <div style="margin-bottom: 8px; color: #ffd700;">图例</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff4444;"></div>
                    <span>磁感线（N→外）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffaa00;"></div>
                    <span>线圈</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #66ccff;"></div>
                    <span>感应电流</span>
                </div>
            </div>
            
            <div class="controls">
                <button onclick="changeSpeed(0.3)">慢速</button>
                <button onclick="changeSpeed(0.8)" class="active" id="btnNormal">正常</button>
                <button onclick="changeSpeed(2)">快速</button>
                <button onclick="togglePause()">暂停</button>
                <button onclick="reset()">重置</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 场景参数
        let speed = 0.8;
        let paused = false;
        let time = 0;
        
        // 磁铁参数
        const magnet = {
            x: 150,
            y: canvas.height / 2,
            width: 180,
            height: 60,
            targetX: 150,
            minX: 150,
            maxX: 450,
            moving: false,
            direction: 1
        };
        
        // 线圈参数
        const coil = {
            x: 550,
            y: canvas.height / 2,
            radius: 100,
            tubeRadius: 12,
            current: 0,
            currentParticles: []
        };
        
        // 磁感线参数
        const fieldLines = [];
        const numFieldLines = 16;
        
        // 初始化磁感线
        function initFieldLines() {
            fieldLines.length = 0;
            for (let i = 0; i < numFieldLines; i++) {
                const angle = (i / numFieldLines) * Math.PI * 2;
                fieldLines.push({
                    angle: angle,
                    length: 300 + Math.random() * 100,
                    curvature: 0.3 + Math.random() * 0.4
                });
            }
        }
        initFieldLines();
        
        // 绘制磁铁（参考图片样式）
        function drawMagnet() {
            const x = magnet.x;
            const y = magnet.y;
            const w = magnet.width;
            const h = magnet.height;
            
            // S极（左侧，白色/灰色）
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(x - w/2, y - h/2, w/2, h);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.strokeRect(x - w/2, y - h/2, w/2, h);
            
            // S极标签
            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('S', x - w/4, y);
            
            // N极（右侧，红色）
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(x, y - h/2, w/2, h);
            ctx.strokeStyle = '#cc0000';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y - h/2, w/2, h);
            
            // N极标签
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('N', x + w/4, y);
            
            // 磁铁边框
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.strokeRect(x - w/2, y - h/2, w, h);
            
            // 磁铁光泽效果
            const gradient = ctx.createLinearGradient(x - w/2, y - h/2, x - w/2, y + h/2);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
            ctx.fillStyle = gradient;
            ctx.fillRect(x - w/2, y - h/2, w, h);
        }
        
        // 绘制磁感线（参考图片样式 - 从N极发出的放射状）
        function drawFieldLines() {
            const magnetRight = magnet.x + magnet.width/2;
            const magnetY = magnet.y;
            
            for (let i = 0; i < numFieldLines; i++) {
                const line = fieldLines[i];
                const angle = line.angle;
                
                // 从N极右端发出的磁感线
                const startX = magnetRight;
                const startY = magnetY + Math.sin(angle) * 15;
                
                // 绘制磁感线（贝塞尔曲线）
                ctx.strokeStyle = 'rgba(255, 80, 80, 0.7)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                
                // 控制点，使线条呈放射状
                const cpX = startX + line.length * 0.4;
                const cpY = startY + Math.sin(angle) * line.length * line.curvature;
                const endX = startX + line.length * Math.cos(angle * 0.5);
                const endY = startY + Math.sin(angle) * line.length * 1.2;
                
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.stroke();
                
                // 绘制箭头（在磁感线末端）
                const arrowT = 0.85;
                const arrowX = (1 - arrowT) * (1 - arrowT) * startX + 
                               2 * (1 - arrowT) * arrowT * cpX + 
                               arrowT * arrowT * endX;
                const arrowY = (1 - arrowT) * (1 - arrowT) * startY + 
                               2 * (1 - arrowT) * arrowT * cpY + 
                               arrowT * arrowT * endY;
                
                // 计算箭头方向
                const tangentX = 2 * (1 - arrowT) * (cpX - startX) + 2 * arrowT * (endX - cpX);
                const tangentY = 2 * (1 - arrowT) * (cpY - startY) + 2 * arrowT * (endY - cpY);
                const arrowAngle = Math.atan2(tangentY, tangentX);
                
                drawArrow(arrowX, arrowY, arrowAngle, 10, 'rgba(255, 80, 80, 0.9)');
            }
        }
        
        // 绘制箭头
        function drawArrow(x, y, angle, length, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(
                x - length * Math.cos(angle - Math.PI / 6),
                y - length * Math.sin(angle - Math.PI / 6)
            );
            ctx.lineTo(
                x - length * Math.cos(angle + Math.PI / 6),
                y - length * Math.sin(angle + Math.PI / 6)
            );
            ctx.closePath();
            ctx.fill();
        }
        
        // 绘制线圈（3D环状效果）
        function drawCoil() {
            const cx = coil.x;
            const cy = coil.y;
            const r = coil.radius;
            
            // 线圈后缘（较暗）
            ctx.strokeStyle = '#666';
            ctx.lineWidth = coil.tubeRadius * 2;
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI * 0.1, Math.PI * 0.9);
            ctx.stroke();
            
            // 线圈主体
            const gradient = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
            gradient.addColorStop(0, '#ffcc66');
            gradient.addColorStop(0.5, '#ffaa00');
            gradient.addColorStop(1, '#cc8800');
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = coil.tubeRadius * 2.5;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
            
            // 线圈高光
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = coil.tubeRadius;
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI * 1.2, Math.PI * 1.8);
            ctx.stroke();
            
            // 线圈边框
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        // 绘制感应电流
        function drawCurrent() {
            if (Math.abs(coil.current) < 0.01) return;
            
            const intensity = Math.min(Math.abs(coil.current), 1);
            const isCounterClockwise = coil.current > 0;
            
            // 电流粒子效果
            if (Math.random() < intensity * 0.5) {
                coil.currentParticles.push({
                    angle: Math.random() * Math.PI * 2,
                    speed: isCounterClockwise ? -0.08 : 0.08,
                    life: 1.0,
                    size: 3 + Math.random() * 3
                });
            }
            
            // 更新和绘制电流粒子
            for (let i = coil.currentParticles.length - 1; i >= 0; i--) {
                const p = coil.currentParticles[i];
                p.angle += p.speed;
                p.life -= 0.015;
                
                if (p.life <= 0) {
                    coil.currentParticles.splice(i, 1);
                    continue;
                }
                
                const px = coil.x + Math.cos(p.angle) * coil.radius;
                const py = coil.y + Math.sin(p.angle) * coil.radius;
                
                ctx.fillStyle = `rgba(100, 200, 255, ${p.life})`;
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 发光效果
                ctx.fillStyle = `rgba(150, 220, 255, ${p.life * 0.5})`;
                ctx.beginPath();
                ctx.arc(px, py, p.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制电流方向指示
            const dirText = isCounterClockwise ? '逆时针 ↺' : '顺时针 ↻';
            ctx.fillStyle = '#66ccff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`感应电流: ${dirText}`, coil.x, coil.y - coil.radius - 30);
            
            // 绘制电流方向箭头（沿线圈）
            const arrowCount = 6;
            for (let i = 0; i < arrowCount; i++) {
                const baseAngle = (Date.now() * 0.003 * (isCounterClockwise ? -1 : 1) + i / arrowCount) * Math.PI * 2;
                const nextAngle = baseAngle + 0.2 * (isCounterClockwise ? -1 : 1);
                
                const x1 = coil.x + Math.cos(baseAngle) * coil.radius;
                const y1 = coil.y + Math.sin(baseAngle) * coil.radius;
                const x2 = coil.x + Math.cos(nextAngle) * coil.radius;
                const y2 = coil.y + Math.sin(nextAngle) * coil.radius;
                
                // 箭头方向
                const angle = Math.atan2(y2 - y1, x2 - x1);
                
                ctx.strokeStyle = `rgba(100, 200, 255, ${intensity})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                
                drawArrow(x2, y2, angle, 8, `rgba(100, 200, 255, ${intensity})`);
            }
        }
        
        // 绘制电流表
        function drawAmmeter() {
            const ax = coil.x + 150;
            const ay = coil.y - 150;
            const size = 60;
            
            // 表盘背景
            ctx.fillStyle = '#f0f0f0';
            ctx.beginPath();
            ctx.arc(ax, ay, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 刻度
            for (let i = -5; i <= 5; i++) {
                const angle = (i / 5) * Math.PI * 0.8 + Math.PI;
                const x1 = ax + Math.cos(angle) * (size - 10);
                const y1 = ay + Math.sin(angle) * (size - 10);
                const x2 = ax + Math.cos(angle) * (size - 20);
                const y2 = ay + Math.sin(angle) * (size - 20);
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = i === 0 ? 3 : 1;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // 指针
            const maxCurrent = 2;
            const needleAngle = Math.PI + (coil.current / maxCurrent) * Math.PI * 0.8;
            const needleLen = size - 15;
            const nx = ax + Math.cos(needleAngle) * needleLen;
            const ny = ay + Math.sin(needleAngle) * needleLen;
            
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(nx, ny);
            ctx.stroke();
            
            // 中心点
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(ax, ay, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // 标签
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('A', ax, ay + size + 25);
            
            // 连接线
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(coil.x + coil.radius, coil.y);
            ctx.lineTo(coil.x + coil.radius + 50, coil.y);
            ctx.lineTo(coil.x + coil.radius + 50, ay);
            ctx.lineTo(ax + size, ay);
            ctx.stroke();
        }
        
        // 计算磁通量
        function calculateFlux() {
            const magnetRight = magnet.x + magnet.width/2;
            const coilLeft = coil.x - coil.radius;
            const distance = coilLeft - magnetRight;
            
            if (distance > 200) return 0;
            if (distance < -100) return 1;
            
            // 非线性关系：距离越近，磁通量越大
            return Math.max(0, Math.min(1, 1 - distance / 200));
        }
        
        // 更新物理
        let lastFlux = 0;
        function updatePhysics(dt) {
            if (!paused) {
                // 磁铁自动移动
                if (!magnet.moving) {
                    magnet.moving = true;
                }
                
                magnet.x += magnet.direction * 40 * dt * speed;
                
                // 到达边界后返回
                if (magnet.x > magnet.maxX) {
                    magnet.direction = -1;
                } else if (magnet.x < magnet.minX) {
                    magnet.direction = 1;
                }
            }
            
            // 计算磁通量
            const flux = calculateFlux();
            const fluxChange = (flux - lastFlux) / dt;
            lastFlux = flux;
            
            // 感应电流（楞次定律）
            // 磁通量增加时，电流为负（逆时针，从左向右看）
            coil.current = -fluxChange * 0.5;
            
            // 限制电流大小
            coil.current = Math.max(-2, Math.min(2, coil.current));
            
            // 更新UI
            updateUI(flux, fluxChange, coil.current);
        }
        
        function updateUI(flux, fluxChange, current) {
            document.getElementById('fluxValue').textContent = flux.toFixed(3);
            document.getElementById('fluxChangeValue').textContent = fluxChange.toFixed(3);
            document.getElementById('currentValue').textContent = Math.abs(current).toFixed(3) + ' A';
            
            const statusBar = document.getElementById('statusBar');
            const explanation = document.getElementById('explanation');
            const directionValue = document.getElementById('directionValue');
            
            if (Math.abs(fluxChange) < 0.01) {
                statusBar.className = 'status-bar status-constant';
                statusBar.textContent = '磁铁静止 - 无感应电流';
                directionValue.textContent = '无';
                explanation.innerHTML = '<strong>楞次定律：</strong>磁铁静止，磁通量不变，无感应电流。';
            } else if (fluxChange > 0) {
                statusBar.className = 'status-bar status-increasing';
                statusBar.textContent = '磁通量增加中...';
                directionValue.textContent = '逆时针 ↺';
                explanation.innerHTML = '<strong>楞次定律：</strong>磁通量增加 → 感应电流产生反向磁场 → 阻碍磁通量增加 → <span style="color:#66ff66">逆时针电流（从左向右看）</span>';
            } else {
                statusBar.className = 'status-bar status-decreasing';
                statusBar.textContent = '磁通量减少中...';
                directionValue.textContent = '顺时针 ↻';
                explanation.innerHTML = '<strong>楞次定律：</strong>磁通量减少 → 感应电流产生同向磁场 → 阻碍磁通量减少 → <span style="color:#ff6666">顺时针电流（从左向右看）</span>';
            }
        }
        
        // 绘制背景网格
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 动画循环
        let lastTime = 0;
        function animate(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const dt = Math.min((currentTime - lastTime) / 1000, 0.05);
            lastTime = currentTime;
            
            updatePhysics(dt);
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制场景
            drawGrid();
            drawFieldLines();
            drawCoil();
            drawCurrent();
            drawMagnet();
            drawAmmeter();
            
            requestAnimationFrame(animate);
        }
        
        // 控制函数
        function changeSpeed(newSpeed) {
            speed = newSpeed;
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (newSpeed === 0.8) document.getElementById('btnNormal').classList.add('active');
        }
        
        function togglePause() {
            paused = !paused;
        }
        
        function reset() {
            magnet.x = magnet.minX;
            magnet.direction = 1;
            coil.current = 0;
            coil.currentParticles = [];
            lastFlux = 0;
        }
        
        // 启动动画
        requestAnimationFrame(animate);
    </script>
</body>
</html>
